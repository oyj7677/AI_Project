spring:
  application:
    name: mystarnow-bff-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mystarnow}
    username: ${DB_USERNAME:mystarnow}
    password: ${DB_PASSWORD:mystarnow}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:3000}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT_MS:1000ms}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: mystarnow-bff-backend

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}
  timezone: ${APP_TIMEZONE:Asia/Seoul}
  default-page-size: 8
  max-page-size: 20
  sample-data:
    enabled: false
  features:
    show-schedules: false
    show-recent-activities: false
    enable-live-now: false
    show-member-detail: true
    show-featured-groups: true
    show-video-feed: true
  reliability:
    live-stale-after-minutes: 5
    activity-stale-after-minutes: 30
    profile-stale-after-minutes: 360
    max-retry-attempts: 2
    live-backoff-multiplier: 2
    activity-backoff-multiplier: 2
    profile-backoff-multiplier: 2
  support:
    platforms:
      - platform: youtube
        enabled: true
        support-mode: auto
      - platform: instagram
        enabled: false
        support-mode: disabled
      - platform: x
        enabled: false
        support-mode: disabled
      - platform: chzzk
        enabled: false
        support-mode: disabled
      - platform: soop
        enabled: false
        support-mode: disabled
  youtube:
    api-key: ${YOUTUBE_API_KEY:}
    api-base-url: ${YOUTUBE_API_BASE_URL:https://www.googleapis.com/youtube/v3}
    api-timeout-ms: ${YOUTUBE_API_TIMEOUT_MS:3000}
    max-results: ${YOUTUBE_MAX_RESULTS:20}
    channel-metadata-poll-minutes: ${YOUTUBE_CHANNEL_METADATA_POLL_MINUTES:720}
    activity-poll-minutes: ${YOUTUBE_ACTIVITY_POLL_MINUTES:15}
    live-poll-minutes: ${YOUTUBE_LIVE_POLL_MINUTES:3}
    enable-etag: ${YOUTUBE_ENABLE_ETAG:true}
    sync-enabled: ${YOUTUBE_SYNC_ENABLED:false}
    mock-enabled: ${YOUTUBE_MOCK_ENABLED:false}
  instagram:
    enabled: ${INSTAGRAM_ENABLED:false}
    api-base-url: ${INSTAGRAM_API_BASE_URL:https://graph.facebook.com}
    timeout-ms: ${INSTAGRAM_TIMEOUT_MS:3000}
  operator-auth:
    enabled: ${OPERATOR_AUTH_ENABLED:true}
    username: ${OPERATOR_USERNAME:operator}
    password: ${OPERATOR_PASSWORD:operator}

---
spring:
  config:
    activate:
      on-profile: local

management:
  health:
    redis:
      enabled: false

app:
  sample-data:
    enabled: false

---
spring:
  config:
    activate:
      on-profile: dev

app:
  sample-data:
    enabled: false
