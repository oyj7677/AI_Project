services:
  postgres:
    image: postgres:16-alpine
    container_name: mystarnow-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: mystarnow
      POSTGRES_USER: mystarnow
      POSTGRES_PASSWORD: mystarnow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mystarnow -d mystarnow"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: mystarnow-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres-data:

