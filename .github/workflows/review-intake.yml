name: review-intake

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  pull_request_review:
    types:
      - submitted
      - edited
      - dismissed
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number"
        required: true
        type: string

jobs:
  intake:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Resolve pull request number
        id: pr
        shell: bash
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os

          event_name = os.environ["GITHUB_EVENT_NAME"]
          if event_name == "workflow_dispatch":
              print("number=${{ inputs.pr_number }}")
          else:
              with open(os.environ["GITHUB_EVENT_PATH"], "r", encoding="utf-8") as file:
                  event = json.load(file)
              print(f"number={event['pull_request']['number']}")
          PY

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Update review intake
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/pr_review_automation.py intake \
            --repo "${{ github.repository }}" \
            --pr "${{ steps.pr.outputs.number }}" \
            --write
