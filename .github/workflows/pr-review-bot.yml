# Legacy helper kept for historical strict-rule validation experiments.
# This workflow is disabled by default because pull_request_target + write access
# is not appropriate for the normal solo review loop.
name: legacy-pr-review-bot

on:
  workflow_dispatch:

jobs:
  approve-test-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Refuse automatic execution
        run: |
          echo "This legacy workflow is workflow_dispatch-only."
          echo "Use it only for explicit historical validation."
      - name: Approve test PR
        if: false
        run: |
          gh api \
            --method POST \
            "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews" \
            -f event=APPROVE \
            -f body="Automated approval for PR flow validation."
        env:
          GH_TOKEN: ${{ github.token }}
