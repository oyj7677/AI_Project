# Legacy helper kept for historical strict-rule validation experiments.
# Normal PR review is now handled by the solo-ai-review Copilot ruleset.
name: legacy-pr-review-bot

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  approve-test-pr:
    if: startsWith(github.event.pull_request.head.ref, 'codex/test-pr-flow')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Approve test PR
        run: |
          gh api \
            --method POST \
            "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews" \
            -f event=APPROVE \
            -f body="Automated approval for PR flow validation."
        env:
          GH_TOKEN: ${{ github.token }}
